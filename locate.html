<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We've Got The Key — Share Your Location</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f6f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a1a2e;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8632a;
      margin-bottom: 32px;
    }

    .icon {
      width: 72px;
      height: 72px;
      background: #fff4ef;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon svg {
      width: 36px;
      height: 36px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a1a2e;
      line-height: 1.3;
    }

    p {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #e8632a;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn:hover { background: #d45520; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled {
      background: #d1d5db;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 24px;
      font-size: 14px;
      color: #6b7280;
      min-height: 24px;
      line-height: 1.5;
    }

    .status.success { color: #16a34a; font-weight: 600; }
    .status.error   { color: #dc2626; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #d1d5db;
      border-top-color: #e8632a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .privacy {
      margin-top: 28px;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">We've Got The Key</div>

    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#e8632a"/>
        <circle cx="12" cy="9" r="2.5" fill="#fff"/>
      </svg>
    </div>

    <h1>Share your location</h1>
    <p>Our team needs your location to get a technician to you as quickly as possible. Tap the button below to share it — this only takes a second.</p>

    <button class="btn" id="shareBtn" onclick="shareLocation()">Share my location</button>

    <div class="status" id="status"></div>

    <div class="privacy">Your location is only used to dispatch our nearest technician and is not stored beyond your job.</div>
  </div>

  <script>
    // session_id is injected into the URL by n8n when the SMS is sent
    // e.g. https://yoursite.com/locate.html?session=abc123
    function getSessionId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('session') || params.get('session_id') || '';
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.innerHTML = msg;
    }

    function shareLocation() {
      const btn = document.getElementById('shareBtn');

      if (!navigator.geolocation) {
        setStatus('Location sharing is not supported on this device.', 'error');
        return;
      }

      btn.disabled = true;
      setStatus('<span class="spinner"></span>Getting your location...');

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude, accuracy } = position.coords;
          const sessionId = getSessionId();

          setStatus('<span class="spinner"></span>Sending to our team...');

          // n8n holds the connection open while it waits for the WhatsApp reply,
          // so we race the fetch against a 6s timer and treat either a 2xx response
          // or a timeout as success (the request was accepted and is being processed).
          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), 6000);

          try {
            // no-cors: n8n has CORS enabled but the response status/body doesn't
            // matter here — we just need n8n to receive the location data.
            await fetch('https://wgtkapi.app.n8n.cloud/webhook/send-location-sms', {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                session_id: sessionId,
                latitude,
                longitude,
                accuracy: Math.round(accuracy)
              })
            });
            clearTimeout(timer);
          } catch (err) {
            clearTimeout(timer);
            console.error('Location send failed:', err);
            setStatus('Something went wrong sending your location. Please tell the agent your address directly.', 'error');
            btn.disabled = false;
            return;
          }

          setStatus('✓ Location shared successfully — our team has it now.', 'success');
          btn.textContent = 'Location sent';
        },
        (error) => {
          btn.disabled = false;
          switch (error.code) {
            case error.PERMISSION_DENIED:
              setStatus('Location access was denied. Please allow location access in your browser settings and try again.', 'error');
              break;
            case error.POSITION_UNAVAILABLE:
              setStatus('Your location could not be determined. Please tell the agent your address directly.', 'error');
              break;
            case error.TIMEOUT:
              setStatus('Location request timed out. Please try again.', 'error');
              break;
            default:
              setStatus('Could not get your location. Please tell the agent your address directly.', 'error');
          }
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }
  </script>
</body>
</html>
